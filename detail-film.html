<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Detail Film STREAM+">

    <title>Detail Film | STREAM+</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">STREAM+</div>

<nav>
<a href="index.html">Beranda</a>
<a href="film.html">Film</a>
<a href="genre.html">Genre</a>
<a href="profile.html">Profil</a>
</nav>

</header>

<div class="container">
    <div class="movie-detail">
        <div class="movie-poster">
            <img
            id="movie-image"
            src=""
            alt="Poster Film"
            loading="lazy">
        </div>

        <div class="movie-info">
            <h1 id="movie-title"></h1>
            <p id="movie-description"></p>
            <div class="movie-meta">
                <span id="movie-year"></span>
                <span id="movie-duration"></span>
                <span id="movie-rating"></span>
                <span id="movie-genre"></span>
            </div>

            <h3>Pemeran</h3>
            <p id="movie-cast"></p>
            <h3>Trailer</h3>

            <iframe
            id="movie-trailer"
            width="100%"
            height="350"
            allowfullscreen>
            </iframe>

            <br><br>
            <a
            id="watch-button"
            class="btn"
            href="#">

            ▶ Tonton Sekarang
            </a>
        </div>
    </div>
</div>

<footer>
Copyright © 2026 STREAM+
</footer>

<script src="detail.js"></script>

</body>

</html>
